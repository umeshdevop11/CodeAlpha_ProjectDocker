<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Layout Example</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .card {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 4px 6px rgba(0,0,0,0.1);
      max-width: 300px;
      margin: auto;
      overflow: hidden;
    }

    .card-header {
      background: #3498db;
      color: white;
      padding: 15px;
      font-size: 1.2em;
      text-align: center;
    }

    .card-content {
      padding: 20px;
      color: #333;
      line-height: 1.5;
    }

    .card-button {
      display: block;
      text-align: center;
      background: #2ecc71;
      color: white;
      padding: 10px;
      text-decoration: none;
      font-weight: bold;
      border-radius: 0 0 8px 8px;
      transition: background 0.3s ease;
    }

    .card-button:hover {
      background: #27ae60;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="card-header">Welcome!</div>
    <div class="card-content">
      <p>This is a simple card layout built with HTML and CSS. You can use it for product previews, blog posts, or profile sections.</p>
    </div>
    <a href="#" class="card-button">Learn More</a>
  </div>
</body>
</html>
